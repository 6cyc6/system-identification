[workspace]
name = "system-identification"
version = "0.1.0"
description = "System identification experiments and MuJoCo trajectory playback"
channels = ["conda-forge"]
platforms = ["linux-64"]

[activation.env]
MPLCONFIGDIR = ".pixi/matplotlib"

[dependencies]
python = ">=3.10,<3.12"
pip = ">=24"
setuptools = ">=69"
wheel = ">=0.42"

# Core numerical / plotting stack from environment.yml
numpy = ">=1.26"
scipy = ">=1.11"
pandas = ">=2"
matplotlib = ">=3.8"
matplotlib-inline = ">=0.1"
bottleneck = ">=1.3"
numexpr = ">=2.8"
imageio = ">=2"
pillow = ">=10"

# Optimization / system-identification stack
cvxpy = ">=1.4"
ecos = ">=2"
osqp = ">=0.6"
scs = ">=3"
pinocchio = ">=3"
eigenpy = ">=3"
hpp-fcl = ">=2"

# Robotics / simulation dependencies from environment.yml plus run_trajectory.py
mujoco = ">=3.6"
pybullet = ">=3.25"
gym = ">=0.26"
assimp = ">=5"
bullet-cpp = ">=3"
eigen = ">=3.4"
octomap = ">=1.9"
console_bridge = ">=1"
tinyxml = ">=2"
urdfdom = ">=4"
urdfdom_headers = ">=1"
catkin_pkg = ">=1"
rospkg = ">=1"

# Experiment utilities from environment.yml
loguru = ">=0.7"
pyyaml = ">=6"
wandb = ">=0.16"
requests = ">=2"
ipython = ">=8"
pyqt = ">=5"
casadi = ">=3.7.2,<4"

[pypi-dependencies]
system-identification = { path = ".", editable = true }
gnupg = "==2.3.1"
drake = { path = "/home/galois/.cache/pypoetry/artifacts/07/c7/ab/61ab8afd355a837d9344f91e06e41ce1ec90eab7d69f27842b63f4c92a/drake-0.0.20260216-cp310-cp310-manylinux_2_34_x86_64.whl" }

[tasks]
run-trajectory = "python script/run_trajectory.py"
run-trajectory-headless = "python script/run_trajectory.py --no-visualize"
optimize-franka-camera-boxes = "python script/generate_excitation_ipopt_drake.py --robot fr3 --link_y_lower -0.45 --link_y_upper 0.35 --link_z_lower 0.0 --drake_camera_chamfer_radius 0.0 --no_plot"
